<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deeside.com — Follow Widget</title>
<style>
  /* ── TOKEN SUBSET (inline until deeside-tokens.css is hosted) ── */
  :root {
    --ds-social-panel:      #12121e;   /* dark panel — matches fuel widget */
    --ds-social-panel-dark: #1c1c2e;   /* surface layer */
    --ds-social-text:       #ffffff;
    --ds-social-muted:      rgba(255,255,255,0.45);
    --ds-social-row-hover:  rgba(255,255,255,0.07);
    --ds-social-divider:    rgba(255,255,255,0.10);
    --ds-radius-md:         8px;
    --ds-font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── WIDGET SHELL ── */
  .follow-widget {
    background: var(--ds-social-panel);
    border-radius: 0;
    overflow: hidden;
    width: 100%;
    font-family: var(--ds-font-sans);
  }

  /* ── HEADER ── */
  .follow-header {
    padding: 14px 16px 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ds-social-muted);
  }

  /* ── PRIMARY PLATFORMS (Instagram, Facebook, X) ── */
  .follow-primary {
    padding: 0 8px 8px;
  }

  .follow-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 8px;
    border-radius: 6px;
    text-decoration: none;
    color: var(--ds-social-text);
    transition: background 140ms ease;
    cursor: pointer;
  }
  .follow-row:hover {
    background: var(--ds-social-row-hover);
  }

  .follow-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .follow-icon svg {
    width: 26px;
    height: 26px;
    fill: var(--ds-social-text);
  }

  .follow-name {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: var(--ds-social-text);
  }

  .follow-count {
    font-size: 14px;
    font-weight: 700;
    color: var(--ds-social-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }

  /* ── DIVIDER ── */
  .follow-divider {
    height: 1px;
    background: var(--ds-social-divider);
    margin: 0 16px 10px;
  }

  /* ── SECONDARY PLATFORMS ── */
  .follow-secondary {
    padding: 0 16px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 0;
    align-items: center;
  }

  .follow-secondary-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--ds-social-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 6px;
  }

  .follow-secondary-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    padding: 3px 7px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.25);
    transition: background 140ms ease, color 140ms ease;
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .follow-secondary-link:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .follow-secondary-link svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
    flex-shrink: 0;
  }
</style>
</head>
