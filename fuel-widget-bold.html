<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deeside Fuel Prices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-bright: #22c55e;
  --green-glow:   rgba(34,197,94,.18);
  --green-dim:    #166534;
  --amber-bright: #f59e0b;
  --amber-glow:   rgba(245,158,11,.18);
  --amber-dim:    #92400e;
  --red-bright:   #ef4444;
  --red-glow:     rgba(239,68,68,.18);
  --bg:           #0c0c0e;
  --panel:        #111114;
  --rule:         rgba(255,255,255,.07);
  --text-primary: #f9fafb;
  --text-muted:   #6b7280;
  --text-dim:     #374151;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: transparent;
  margin: 0;
  padding: 0;
  width: 100%;
}

.fw {
  background: var(--bg);
  border-radius: 8px;
  overflow: hidden;
  width: 100%;
  position: relative;
  border: 1px solid rgba(255,255,255,.06);
  box-shadow:
    0 0 0 1px rgba(0,0,0,.4),
    0 8px 32px rgba(0,0,0,.6);
}

.fw::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 10;
  opacity: .5;
}

.fw-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--rule);
  position: relative;
}

.fw-brand {
  display: flex;
  align-items: center;
  gap: 7px;
}

.fw-brand-icon {
  width: 22px;
  height: 22px;
  opacity: .9;
}

.fw-brand-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--text-primary);
}

.fw-brand-sub {
  font-size: 9.5px;
  font-weight: 400;
  letter-spacing: .2px;
  color: var(--text-muted);
  display: block;
  margin-top: 0px;
  line-height: 1;
}

.fw-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--green-bright);
  opacity: .85;
}

.live-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green-bright);
  box-shadow: 0 0 8px var(--green-bright);
  animation: pip 2.4s ease-in-out infinite;
}

@keyframes pip {
  0%,100% { opacity: 1; box-shadow: 0 0 8px var(--green-bright); }
  50%      { opacity: .35; box-shadow: none; }
}

.fw-prices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
}

.fw-prices::after {
  content: '';
  position: absolute;
  top: 10%;
  bottom: 10%;
  left: 50%;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
}

.fw-cell {
  padding: 16px 14px 14px;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: background .25s;
}

.fw-cell.petrol::before {
  content: '';
  position: absolute;
  top: -20px; left: -20px; right: -20px; bottom: -20px;
  background: radial-gradient(ellipse at 40% 20%, var(--green-glow), transparent 70%);
  pointer-events: none;
  opacity: 0;
  animation: glowIn .8s .3s forwards;
}

.fw-cell.diesel::before {
  content: '';
  position: absolute;
  top: -20px; left: -20px; right: -20px; bottom: -20px;
  background: radial-gradient(ellipse at 60% 20%, var(--amber-glow), transparent 70%);
  pointer-events: none;
  opacity: 0;
  animation: glowIn .8s .5s forwards;
}

@keyframes glowIn {
  to { opacity: 1; }
}

.fw-cell-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
  position: relative;
}

.fw-price-wrap {
  display: flex;
  align-items: flex-start;
  line-height: 1;
  position: relative;
  overflow: hidden;
}

.fw-price-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px;
  line-height: .9;
  letter-spacing: -1px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .4s, transform .4s;
}

.fw-price-num.loaded {
  opacity: 1;
  transform: translateY(0);
}

.fw-cell.petrol .fw-price-num  { color: var(--green-bright); }
.fw-cell.diesel .fw-price-num  { color: var(--amber-bright); }

.fw-price-unit {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  margin-top: 6px;
  margin-left: 2px;
  opacity: .6;
}

.fw-cell.petrol .fw-price-unit { color: var(--green-bright); }
.fw-cell.diesel .fw-price-unit { color: var(--amber-bright); }

.fw-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .3px;
  padding: 3px 6px;
  border-radius: 3px;
  margin-top: 8px;
  position: relative;
}

.fw-badge.green {
  background: rgba(34,197,94,.12);
  color: var(--green-bright);
  border: 1px solid rgba(34,197,94,.2);
}
.fw-badge.amber {
  background: rgba(245,158,11,.12);
  color: var(--amber-bright);
  border: 1px solid rgba(245,158,11,.2);
}
.fw-badge.red {
  background: rgba(239,68,68,.12);
  color: var(--red-bright);
  border: 1px solid rgba(239,68,68,.2);
}

.fw-station {
  margin-top: 6px;
  font-size: 10px;
  font-weight: 400;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  position: relative;
}

.fw-station strong {
  color: rgba(255,255,255,.55);
  font-weight: 500;
}

.fw-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-top: 1px solid var(--rule);
  background: rgba(34,197,94,.08);
}

.fw-cta {
  display: flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .3px;
  color: #22c55e;
  transition: opacity .15s;
}

.fw-cta:hover { opacity: .8; }

.fw-cta svg {
  width: 13px;
  height: 13px;
  transition: transform .15s;
}

.fw-cta:hover svg { transform: translateX(2px); }

.fw-meta {
  font-size: 10px;
  color: rgba(255,255,255,.6);
  letter-spacing: .2px;
}

.fw-saving {
  padding: 7px 14px;
  background: rgba(34,197,94,.08);
  border-top: 1px solid rgba(34,197,94,.12);
  font-size: 10px;
  font-weight: 500;
  color: var(--green-bright);
  letter-spacing: .2px;
  display: flex;
  align-items: center;
  gap: 5px;
  opacity: 0;
  animation: fadeUp .5s .8s forwards;
}

@keyframes fadeUp {
  to { opacity: 1; }
}

.fw-saving::before {
  content: '★';
  font-size: 10px;
}

.fw-loading {
  padding: 32px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.fw-loading-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.fw-skeleton-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  padding: 0 4px;
}

.skel {
  height: 64px;
  border-radius: 4px;
  background: linear-gradient(90deg, #1a1a1e 25%, #222226 50%, #1a1a1e 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.fw-error {
  padding: 20px 14px;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<div class="fw" id="fw">
  <div class="fw-header">
    <div class="fw-brand">
      <svg class="fw-brand-icon" viewBox="0 0 22 22" fill="none">
        <rect x="2" y="3" width="11" height="16" rx="1.5" stroke="#6b7280" stroke-width="1.3" fill="none"/>
        <rect x="4.5" y="5.5" width="6" height="4" rx=".8" fill="#374151"/>
        <line x1="13" y1="7" x2="18" y2="7" stroke="#6b7280" stroke-width="1.3"/>
        <line x1="18" y1="7" x2="18" y2="12" stroke="#6b7280" stroke-width="1.3"/>
        <circle cx="18" cy="13" r="1.2" fill="#374151" stroke="#6b7280" stroke-width="1"/>
        <line x1="7.5" y1="15" x2="7.5" y2="19" stroke="#6b7280" stroke-width="1.3"/>
      </svg>
      <div>
        <span class="fw-brand-text">Deeside Fuel Prices</span>
        <span class="fw-brand-sub">Cheapest local prices right now</span>
      </div>
    </div>
    <div class="fw-live"><div class="live-pip"></div>Live</div>
  </div>
  <div class="fw-loading">
    <div class="fw-skeleton-grid">
      <div class="skel"></div>
      <div class="skel"></div>
    </div>
    <div class="fw-loading-label">Fetching latest prices…</div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const DATA_URL  = 'https://deeside-fuel-prices.netlify.app/stations.json';
const TOOL_URL  = 'https://deeside-fuel-prices.netlify.app/';
const STALE_HOURS = 120;

// ─── GA4 CLICK TRACKING ──────────────────────────────────────────
function trackCtaClick(stationCount) {
  if (typeof gtag !== 'undefined') {
    gtag('event', 'widget_cta_click', {
      event_category: 'fuel_widget',
      event_label: 'compare_all_stations',
      value: stationCount
    });
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────
function isFresh(station) {
  if (!station.updated) return false;
  const hrs = (Date.now() - new Date(station.updated).getTime()) / 3600000;
  return hrs < STALE_HOURS;
}

function badge(price, avg) {
  const d = +(price - avg).toFixed(1);
  if (d < 0)  return { cls: 'green', txt: `${Math.abs(d)}p below UK avg` };
  if (d < 5)  return { cls: 'amber', txt: `${d}p above UK avg` };
  return        { cls: 'red',   txt: `${d}p above UK avg` };
}

function clean(name) {
  return (name || '').trim().slice(0, 28);
}

// ─── RENDER ──────────────────────────────────────────────────────
function render(unl, dsl, total, UK_AVG_UNL, UK_AVG_DSL, lastUpdated) {
  const ub = badge(unl.price, UK_AVG_UNL);
  const db = badge(dsl.price, UK_AVG_DSL);

  const saving = ((UK_AVG_UNL - unl.price) / 100 * 50);
  const savingHtml = saving > 0
    ? `<div class="fw-saving">Fill 50L here and save £${saving.toFixed(2)} vs UK average</div>`
    : '';

  const hhmm = lastUpdated
    ? new Date(lastUpdated).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })
    : new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

  document.getElementById('fw').innerHTML = `
    <div class="fw-header">
      <div class="fw-brand">
        <svg class="fw-brand-icon" viewBox="0 0 22 22" fill="none">
          <rect x="2" y="3" width="11" height="16" rx="1.5" stroke="rgba(255,255,255,.35)" stroke-width="1.3" fill="none"/>
          <rect x="4.5" y="5.5" width="6" height="4" rx=".8" fill="rgba(255,255,255,.12)"/>
          <line x1="13" y1="7" x2="18" y2="7" stroke="rgba(255,255,255,.35)" stroke-width="1.3"/>
          <line x1="18" y1="7" x2="18" y2="12" stroke="rgba(255,255,255,.35)" stroke-width="1.3"/>
          <circle cx="18" cy="13" r="1.2" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
          <line x1="7.5" y1="15" x2="7.5" y2="19" stroke="rgba(255,255,255,.35)" stroke-width="1.3"/>
        </svg>
        <div>
          <span class="fw-brand-text">Deeside Fuel Prices</span>
          <span class="fw-brand-sub">Cheapest local prices right now</span>
        </div>
      </div>
      <div class="fw-live"><div class="live-pip"></div>Live</div>
    </div>

    <div class="fw-prices">
      <div class="fw-cell petrol">
        <div class="fw-cell-label">Petrol</div>
        <div class="fw-price-wrap">
          <div class="fw-price-num" id="pnum">${unl.price.toFixed(1)}</div>
          <div class="fw-price-unit">p</div>
        </div>
        <div class="fw-badge ${ub.cls}">${ub.txt}</div>
        <div class="fw-station"><strong>${clean(unl.name)}</strong></div>
      </div>
      <div class="fw-cell diesel">
        <div class="fw-cell-label">Diesel</div>
        <div class="fw-price-wrap">
          <div class="fw-price-num" id="dnum">${dsl.price.toFixed(1)}</div>
          <div class="fw-price-unit">p</div>
        </div>
        <div class="fw-badge ${db.cls}">${db.txt}</div>
        <div class="fw-station"><strong>${clean(dsl.name)}</strong></div>
      </div>
    </div>

    ${savingHtml}

    <div class="fw-footer">
      <a class="fw-cta" href="${TOOL_URL}" target="_blank" rel="noopener"
         onclick="trackCtaClick(${total})">
        Compare all ${total} local stations
        <svg viewBox="0 0 12 12" fill="none">
          <path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <span class="fw-meta">Updated ${hhmm}</span>
    </div>
  `;

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById('pnum')?.classList.add('loaded');
      document.getElementById('dnum')?.classList.add('loaded');
    }, 60);
  });
}

// ─── ERROR ───────────────────────────────────────────────────────
function showError() {
  document.getElementById('fw').innerHTML = `
    <div class="fw-header">
      <div class="fw-brand">
        <div>
          <span class="fw-brand-text">Deeside Fuel Prices</span>
          <span class="fw-brand-sub">Deeside, Flintshire &amp; Chester</span>
        </div>
      </div>
    </div>
    <div class="fw-error">
      Prices temporarily unavailable —
      <a href="${TOOL_URL}" target="_blank" style="color:#f59e0b">check the full map →</a>
    </div>
  `;
}

// ─── FETCH ───────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(DATA_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data       = await res.json();
    const stations   = data.stations;
    const UK_AVG_UNL = data.nationalAvg.unleaded;
    const UK_AVG_DSL = data.nationalAvg.diesel;

    // Exclude Costco from cheapest price display (members only — not open access)
    const openStations = stations.filter(s => !s.name?.toUpperCase().includes('COSTCO') && s.distance <= 9);
    const byUnl = openStations.filter(s => s.unleaded && s.unleaded >= 115 && isFresh(s)).sort((a,b) => a.unleaded - b.unleaded);
    const byDsl = openStations.filter(s => s.diesel && s.diesel >= 115 && isFresh(s)).sort((a,b) => a.diesel - b.diesel);

    if (!byUnl.length || !byDsl.length) throw new Error('No fresh prices found');

    render(
      { price: byUnl[0].unleaded, name: byUnl[0].name },
      { price: byDsl[0].diesel,   name: byDsl[0].name },
      stations.length,
      UK_AVG_UNL,
      UK_AVG_DSL,
      data.lastUpdated
    );
  } catch(e) {
    console.error('Fuel widget:', e);
    showError();
  }
}

init();
</script>
</body>
</html>
